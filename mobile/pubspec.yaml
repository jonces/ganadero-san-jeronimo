name: finca_ganadera
description: Software Ganadero Henriquez — gestión profesional de ganado.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  video_player: ^2.9.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#051908"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#051908"
  image: assets/icon/icon.png
  android: true
  ios: false
  android_gravity: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
